name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type: release (signed) or debug'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      upload_to_capgo:
        description: 'Publish web bundle to Capgo after build?'
        required: false
        default: false
        type: boolean

env:
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'release' }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        working-directory: frontend
        run: pnpm run build

      - name: Sync Capacitor to Android
        working-directory: frontend
        run: pnpm exec cap sync android

      - name: Make Gradle wrapper executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      # ── Release signing setup ──────────────────────────────────────────────
      - name: Decode keystore from secret
        if: env.BUILD_TYPE == 'release'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > frontend/android/release-key.jks

      - name: Write keystore.properties
        if: env.BUILD_TYPE == 'release'
        run: |
          cat > frontend/android/keystore.properties << EOF
          storeFile=../release-key.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build signed release APK
        if: env.BUILD_TYPE == 'release'
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build debug APK
        if: env.BUILD_TYPE == 'debug'
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload signed release APK
        if: env.BUILD_TYPE == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: CAF-Pharmacy-release-${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload debug APK
        if: env.BUILD_TYPE == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: CAF-Pharmacy-debug-${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── Capgo live update (optional) ──────────────────────────────────────
      - name: Publish web bundle to Capgo
        if: github.event.inputs.upload_to_capgo == 'true' && secrets.CAPGO_TOKEN != ''
        working-directory: frontend
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
        run: npx @capgo/cli bundle upload --channel production --path dist --apikey "$CAPGO_TOKEN"

      # ── Cleanup secrets ────────────────────────────────────────────────────
      - name: Remove keystore from runner
        if: always() && env.BUILD_TYPE == 'release'
        run: |
          rm -f frontend/android/release-key.jks
          rm -f frontend/android/keystore.properties
